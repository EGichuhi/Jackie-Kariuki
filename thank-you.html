<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Thank You | Jacqueline Kariuki</title>
  <link href="assets/img/favicon.png" rel="icon">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans:wght@400;600;700&family=Questrial&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  <style>
    .thankyou-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
    }
    .thankyou-page .icon {
      font-size: 4rem;
      color: #28a745;
      margin-bottom: 24px;
    }
    .thankyou-page h1 {
      font-weight: 700;
      margin-bottom: 16px;
    }
    .thankyou-page p {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }
    .btn-submit {
      background-color: var(--accent-color);
      color: var(--contrast-color);
      padding: 0.75rem 2rem;
      font-weight: 500;
      border-radius: 8px;
      transition: all 0.3s ease;
      display: inline-block;
    }
    .btn-submit:hover {
      background-color: color-mix(in srgb, var(--accent-color), transparent 15%);
      color: var(--contrast-color);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo d-flex align-items-center me-auto me-xl-0">
        <h1 class="sitename">Jacqueline Kariuki</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html#hero">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#services">Services</a></li>
          <li><a href="index.html#portfolio">Community</a></li>
          <li><a href="blog.html" >Stories</a></li>
          <li><a href="index.html#contact" class="active">Contact</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="thankyou-page">
      <div>
        <div class="icon"><i class="bi bi-check-circle-fill"></i></div>
        <h1>Thank You!</h1>
        <p>Your message has been received. Jacqueline will get back to you as soon as possible.</p>
        <a href="index.html" class="btn btn-submit px-5 py-3">Back to Home</a>
      </div>
    </section>
  </main>

  <footer id="footer" class="footer">
    <div class="copyright text-center">
      <p>&copy; <span id="year"></span> Jacqueline Kariuki. All Rights Reserved.</p>
      <p>Designed by <a href="https://www.eunicegichuhi.site/">Eunice Gichuhi</a></p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
